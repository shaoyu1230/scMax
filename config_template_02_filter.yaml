# scMax 02_filter (数据深度质控与过滤) 配置模板
# ==========================================================

02_filter:
  run: true
  rdsfile: ""               # 留空则默认继承上一阶段 (01_scQC) 产出
  
  # 细胞/基因质量控制阈值
  min_feat: 200             # 每个细胞最低检测到基因数
  max_feat: 5000            # 每个细胞最高检测到基因数
  max_mt: 20                # 最大线粒体基因比例 (%)
  max_hb: 5                 # 最大红细胞基因比例 (%)
  
  col_sample: "Sample"      # 拆分样本所依据的列名
