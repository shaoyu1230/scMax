# scMax 06_merge_sub (亚群注释回填整合) 配置模板
# ==========================================================

# 基础环境配置（可选）
# 如需指定特定 R 环境，可填写完整 Rscript 路径
# 例如: "/path/to/miniconda3/envs/scRNA/bin/Rscript"
Rscript_path: ""

06_merge_sub:
  run: true

  # --- 核心路径 ---
  main_rds: ""                  # [必填] 大群注释后的主对象 RDS
  outdir: "./06_merge_sub_out"

  # --- 亚群映射 ---
  # key: 主对象中的大群名称，如果是两群合并细分则需要写两行 用同一个 rds，例如：
  # Macrophage: "./04_subcluster_Myeloid/output/subcluster_final.rds"
  # Neutrophil: "./04_subcluster_Myeloid/output/subcluster_final.rds"
  # value: 对应亚群注释完成后的 RDS
  # 未进行亚群细分的大群无需列出，程序会自动保留其细胞及原大群名称
  sub_rds_map:
    Epithelial: "./04_subcluster_Epithelial/output/subcluster_final.rds"
    Immune: "./04_subcluster_Immune/output/subcluster_final.rds"

  # --- 列名约定 ---
  major_col: "MajorType"        # 主对象中的大群列
  sub_col: "CellType"           # 亚群对象中的注释列
  subtype_col: "SubType"        # 回填到主对象 metadata 的新列
  sample_col: "Sample"          # 样本列
  group_col: "Group"            # 分组列，多个可写为 "Group,Treatment"
