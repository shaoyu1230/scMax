# scMax 07_differential (深度差异挖掘模块) 配置模板
# ==========================================================

07_differential:
  run: true                 # 运行此模块
  rdsfile: ""               # [必填] 输入的 Seurat RDS 对象路径
  
  # 差异模式选择:
  # A: all_markers (寻找指定groupby列中所有组的Marker)
  # B: group_comparison (在 split_by 指定的亚群内部，比较 groupby 指定条件列的组间差异)
  method: "all_markers"
  
  groupby: "CellType"       # 模式A: 找该列各组 marker；模式B: 作为比较条件列 (如 Group)
  
  # --- 模式 B 专用参数 ---
  split_by: "CellType"      # 模式B: 在该列定义的亚群内部做组间比较 (如 CellType / SubType)
  cmp_file: ""              # Tab分隔的比较对列表 (每行两列: GroupA GroupB)
  
  # --- 富集分析 ---
  do_enrich: true           # 是否自动执行 GO/KEGG 富集分析
