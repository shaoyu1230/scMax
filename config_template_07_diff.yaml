# scMax 07_differential (深度差异挖掘模块) 配置模板
# ==========================================================

07_differential:
  run: true                 # 运行此模块
  rdsfile: ""               # [必填] 输入的 Seurat RDS 对象路径
  
  # 差异模式选择:
  # A: all_markers (寻找指定groupby列中所有组的Marker)
  # B: group_comparison (在非groupby列的内部分组间做两两比较，如亚群内做对组对比)
  method: "all_markers"
  
  groupby: "CellType"       # 分类依据列 (如 CellType)
  
  # --- 模式 B 专用参数 ---
  split_by: "CellType"      # 亚群拆分依据列 (通常同 groupby)
  cmp_file: ""              # Tab分隔的比较对列表 (每行两列: GroupA GroupB)
  
  # --- 富集分析 ---
  do_enrich: true           # 是否自动执行 GO/KEGG 富集分析
